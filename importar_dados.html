async function iniciarImport() {
  if (!confirm('Confirmar importação? Todos os dados existentes serão SUBSTITUÍDOS.')) return;
  document.getElementById('btnImport').disabled = true;
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  try {
    // 1. Deletar agendamentos existentes
    log('🗑️ Apagando operações existentes...');
    const { error: e1 } = await sb.from('agendamentos').delete().neq('id', 0);
    if (e1) { log('Erro ao apagar operações: ' + e1.message, 'err'); }
    else { log('✓ Operações apagadas', 'ok'); }

    // 2. Deletar despesas existentes
    log('🗑️ Apagando despesas existentes...');
    const { error: e2 } = await sb.from('despesas').delete().neq('id', 0);
    if (e2) { log('Erro ao apagar despesas: ' + e2.message, 'err'); }
    else { log('✓ Despesas apagadas', 'ok'); }

    // 3. Inserir agendamentos em lotes
    log(`📋 Inserindo ${AGENDAMENTOS.length} operações...`);
    const BATCH = 50;
    let ok_ags = 0;
    for (let i = 0; i < AGENDAMENTOS.length; i += BATCH) {
      const lote = AGENDAMENTOS.slice(i, i + BATCH);
      let { error: e3 } = await sb.from('agendamentos').insert(lote);
      if (e3 && e3.message && e3.message.includes('status')) {
        // Coluna status pode não existir — tentar sem ela
        const lote2 = lote.map(r => { const {status, ...rest} = r; return rest; });
        const { error: e3b } = await sb.from('agendamentos').insert(lote2);
        if (e3b) { log('Erro no lote ' + i + ': ' + e3b.message, 'err'); continue; }
        log('⚠️ Inserido sem coluna status (adicione a coluna no Supabase)', 'info');
      } else if (e3) {
        log('Erro no lote ' + i + ': ' + e3.message, 'err'); continue;
      }
      ok_ags += lote.length;
      log(`  ✓ ${ok_ags}/${AGENDAMENTOS.length} operações inseridas`, 'ok');
    }

    // 4. Inserir despesas em lotes
    log(`💰 Inserindo ${DESPESAS.length} despesas...`);
    let ok_desps = 0;
    for (let i = 0; i < DESPESAS.length; i += BATCH) {
      const lote = DESPESAS.slice(i, i + BATCH);
      const { error: e4 } = await sb.from('despesas').insert(lote);
      if (e4) { log('Erro despesas lote ' + i + ': ' + e4.message, 'err'); continue; }
      ok_desps += lote.length;
      log(`  ✓ ${ok_desps}/${DESPESAS.length} despesas inseridas`, 'ok');
    }

    log('', 'info');
    log('🎉 IMPORTAÇÃO CONCLUÍDA! Feche esta aba e recarregue o sistema.', 'ok');
    log(`📊 Total: ${ok_ags} operações + ${ok_desps} despesas`, 'ok');
  } catch(err) {
    log('Erro inesperado: ' + err.message, 'err');
  } finally {
    document.getElementById('btnImport').disabled = false;
  }
}
  </script>
</body>
